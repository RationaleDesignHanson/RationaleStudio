<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FUBO · AI thumbnail showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d;
      --bg-2: #161616;
      --line: #2a2a2a;
      --ink: #f5f5f5;
      --ink-2: #b3b3b3;
      --ink-3: #6f6f6f;
      --accent: #ff6c00;
      --accent-2: #ffd700;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'IBM Plex Mono', ui-monospace, monospace; height: 100%; }
    .wrap { display: grid; grid-template-rows: auto 1fr; height: 100vh; min-height: 600px; }
    header { padding: 14px 20px; border-bottom: 1px solid var(--line); background: var(--bg-2); display: flex; align-items: baseline; gap: 12px; }
    header h1 { margin: 0; font-size: 18px; color: var(--accent); letter-spacing: 0.04em; }
    header .meta { color: var(--ink-3); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }
    .body { display: grid; grid-template-columns: 280px 1fr; min-height: 0; }
    aside { border-right: 1px solid var(--line); padding: 16px 14px; overflow-y: auto; background: var(--bg-2); }
    aside h2 { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 8px; font-weight: 500; }
    aside .group { margin-bottom: 22px; }
    .pill { display: inline-block; padding: 5px 10px; margin: 0 4px 4px 0; border: 1px solid var(--line); border-radius: 999px; cursor: pointer; font-size: 11px; color: var(--ink-2); background: transparent; transition: 80ms; }
    .pill:hover { border-color: var(--ink-3); color: var(--ink); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #000; }
    .pill[disabled] { opacity: 0.4; cursor: not-allowed; }
    main { display: flex; align-items: center; justify-content: center; padding: 28px; min-height: 0; position: relative; overflow: hidden; }
    .canvas { position: relative; max-width: 100%; max-height: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; }
    .canvas img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .canvas.loading::before { content: ''; position: absolute; inset: 0; background: linear-gradient(110deg, transparent 30%, rgba(255,108,0,0.12) 50%, transparent 70%); animation: scan 1.4s linear infinite; pointer-events: none; }
    .canvas .stamp { position: absolute; bottom: 10px; left: 12px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent-2); background: rgba(0,0,0,0.5); padding: 4px 8px; border: 1px solid var(--line); }
    .empty { color: var(--ink-3); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; }
    @keyframes scan { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    @media (max-width: 700px) {
      .body { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); max-height: 280px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>FUBO · Thumbnail Generator</h1>
      <span class="meta">v6.0 · Showcase</span>
    </header>
    <div class="body">
      <aside>
        <div class="group" data-group="league"><h2>League</h2><div class="pills"></div></div>
        <div class="group" data-group="team"><h2>Team</h2><div class="pills"></div></div>
        <div class="group" data-group="style"><h2>Style</h2><div class="pills"></div></div>
      </aside>
      <main>
        <div class="canvas" id="canvas">
          <span class="empty" id="empty">pick a combo</span>
        </div>
      </main>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
