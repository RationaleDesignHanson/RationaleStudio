[build]
  command = "npm run build"
  # No publish directory - @netlify/plugin-nextjs handles deployment automatically

[build.environment]
  NODE_VERSION = "22"
  NODE_OPTIONS = "--max-old-space-size=4096"
  # Firebase Client SDK environment variables are set in Netlify Dashboard
  # Bypass secrets scanner for Firebase public API keys (they're meant for client-side)
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
  # Firebase Admin credentials - env var set in Netlify Dashboard, accessed directly by build plugin

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"

[[functions."*"]]
  timeout = 26

# Environment variables are available globally, no need to specify in functions
# Removed functions.environment to avoid AWS Lambda 4KB limit
# ANTHROPIC_API_KEY configured in Netlify dashboard for recipe extraction

# Security headers — kept in sync with next.config.mjs so static
# files served by the Netlify edge (e.g. /prototypes/*/index.html)
# get the same iframe + CSP allowances as Next-rendered routes.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://vercel.live https://*.vercel-insights.com https://*.netlify.app https://apis.google.com https://*.googleapis.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob: https://*.netlify.app https://*.netlify.com; connect-src 'self' https://*.vercel-insights.com https://*.supabase.co wss://*.supabase.co https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.netlify.app https://apis.google.com https://*.googleapis.com; frame-src 'self' https://vercel.live https://accounts.google.com https://apis.google.com https://*.firebaseapp.com https://silly-questions.com https://*.vercel.app https://vimeo.com https://player.vimeo.com https://www.youtube.com https://www.youtube-nocookie.com;"

# Cache optimization for static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Apple App Site Association (AASA) for iOS Universal Links
# Must be:
# - HTTPS
# - 200 (no redirects)
# - Content-Type: application/json
# - No file extension
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

# Next.js image optimization is handled by @netlify/plugin-nextjs
# Removed redirect that was breaking image optimization
